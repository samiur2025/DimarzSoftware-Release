<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dimrz Splash</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      /* Remove any selection */
      user-select: none;
      -webkit-user-select: none;
    }
    
    .splash-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      /* Floating animation */
      animation: float 4s ease-in-out infinite;
    }

    .splash-image {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
      /* Add a subtle drop shadow to make the center core pop out */
      filter: drop-shadow(0 15px 35px rgba(0, 0, 0, 0.6));
      /* A subtle fade in */
      animation: fadeIn 1.5s ease-out forwards;
      opacity: 0;
    }

    @keyframes float {
      0% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-15px);
      }
      100% {
        transform: translateY(0px);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <img src="splash.png" alt="Dimrz Loading" class="splash-image" />
  </div>
</body>
</html>
